<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- Tema inicial aplicado antes do React montar, evita flash de cor errada -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('eb-codex-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>

    <title>EB CODEX — Engenharia de Software de Alto Padrão</title>
    <meta name="description" content="EB CODEX cria produtos digitais de alto padrão: sites, sistemas e plataformas sob medida, com entrega e implantação em até 7 dias. Precisão de engenharia, acabamento de produto premium." />
    <meta name="keywords" content="desenvolvimento de software, full-stack, React, sistemas web, SaaS, EB CODEX, Esdras, engenharia de software, desenvolvimento sob medida" />
    <meta name="author" content="EB CODEX" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ebcodex.dev/" />

    <!-- Open Graph -->

    <meta property="og:description" content="Produtos digitais sob medida com precisão de engenharia e acabamento premium. Do briefing à implantação em até 7 dias." />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:url" content="https://ebcodex.dev/" />

    <!-- Twitter Card -->
